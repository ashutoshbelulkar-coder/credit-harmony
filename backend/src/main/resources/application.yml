################################################################################
# HCB Platform Backend — Application Configuration
# Profile: default (inherited by all profiles)
################################################################################

spring:
  application:
    name: hcb-platform-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: none                   # Schema managed exclusively via create_tables.sql
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: always                     # Run schema + seed on every startup in dev
      schema-locations: classpath:db/create_tables.sql
      data-locations: classpath:db/seed_data.sql

---
################################################################################
# DEV PROFILE
################################################################################

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:sqlite:${HCB_DB_PATH:./data/hcb_platform.db}
    driver-class-name: org.sqlite.JDBC
    username: ""
    password: ""

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console — DEV ONLY — proxied to SQLite connection for inspection
  # Note: H2 console reads from the H2 in-memory view; for direct SQLite inspection
  # use the SQLite CLI or DB Browser for SQLite with the file at ${HCB_DB_PATH}.
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false        # Local access only

  sql:
    init:
      mode: always

# JWT configuration (override via env vars in production)
hcb:
  jwt:
    secret: ${HCB_JWT_SECRET:hcb-super-secret-dev-key-min-256-bits-long-replace-in-prod-2026}
    access-token-expiry-seconds: 900          # 15 minutes
    refresh-token-expiry-seconds: 604800      # 7 days

  security:
    h2-console-username: ${HCB_H2_USER:admin}
    h2-console-password: ${HCB_H2_PASS:admin123}
    cors-allowed-origins: ${HCB_CORS_ORIGINS:http://localhost:5173,http://localhost:8080}

  encryption:
    pii-key: ${HCB_PII_KEY:hcb-pii-encryption-key-32-chars!!}
    hmac-pepper: ${HCB_HMAC_PEPPER:hcb-hmac-pepper-secret-value-here}

logging:
  level:
    com.hcb: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: ${SERVER_PORT:8090}
  error:
    include-message: never             # Never expose internal errors to API consumers
    include-stacktrace: never
    include-binding-errors: never

---
################################################################################
# PROD PROFILE
################################################################################

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}               # Must be set via environment variable
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  h2:
    console:
      enabled: false                   # NEVER enable in production

  sql:
    init:
      mode: never                      # Schema managed via Flyway in production

hcb:
  jwt:
    secret: ${HCB_JWT_SECRET}          # Must be set in production environment
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 604800

  security:
    cors-allowed-origins: ${HCB_CORS_ORIGINS}

logging:
  level:
    com.hcb: INFO
    org.springframework.security: WARN
