################################################################################
# HCB Platform Backend — Application Configuration
# Profile: default (inherited by all profiles)
################################################################################

spring:
  application:
    name: hcb-platform-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

  jpa:
    hibernate:
      ddl-auto: none                   # Schema managed exclusively via create_tables.sql
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: always                     # Run schema + seed on every startup in dev
      schema-locations: classpath:db/create_tables.sql
      data-locations: classpath:db/seed_data.sql

---
################################################################################
# DEV PROFILE
################################################################################

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # date_string_format: store datetimes as TEXT like seed SQL — avoids INTEGER epoch ms rows that break JPA list hydration (500 on GET /institutions).
    url: "jdbc:sqlite:${HCB_DB_PATH:./data/hcb_platform.db}?date_string_format=yyyy-MM-dd HH:mm:ss"
    driver-class-name: org.sqlite.JDBC
    username: ""
    password: ""
    # JPA (OSIV) + JdbcTemplate need more than one connection or overview/monitoring handlers can stall.
    hikari:
      maximum-pool-size: 5

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    # Avoid duplicating SQL: use logging.level.org.hibernate.SQL instead of show-sql stdout
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # H2 Console — DEV ONLY — proxied to SQLite connection for inspection
  # Note: H2 console reads from the H2 in-memory view; for direct SQLite inspection
  # use the SQLite CLI or DB Browser for SQLite with the file at ${HCB_DB_PATH}.
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false        # Local access only

  sql:
    init:
      mode: always

# JWT configuration (override via env vars in production)
hcb:
  jwt:
    secret: ${HCB_JWT_SECRET:hcb-super-secret-dev-key-min-256-bits-long-replace-in-prod-2026}
    access-token-expiry-seconds: 900          # 15 minutes
    refresh-token-expiry-seconds: 604800      # 7 days

  security:
    h2-console-username: ${HCB_H2_USER:admin}
    h2-console-password: ${HCB_H2_PASS:admin123}
    cors-allowed-origins: ${HCB_CORS_ORIGINS:http://localhost:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost:4173,http://127.0.0.1:4173}

  encryption:
    pii-key: ${HCB_PII_KEY:hcb-pii-encryption-key-32-chars!!}
    hmac-pepper: ${HCB_HMAC_PEPPER:hcb-hmac-pepper-secret-value-here}

  # Schema Mapper Agent (parity with legacy server/schemaMapper.ts)
  schema-mapper:
    enabled: ${HCB_SCHEMA_MAPPER_ENABLED:true}
    llm-enabled: ${SCHEMA_MAPPER_LLM_ENABLED:true}
    openai-model: ${OPENAI_SCHEMA_MODEL:gpt-4o-mini}

  # Dev-only: after SQL seed, re-encode admin@hcb.com with the live PasswordEncoder (see DevAuthDataBootstrap).
  dev:
    sync-seed-passwords: ${HCB_DEV_SYNC_SEED_PASSWORDS:true}

logging:
  level:
    com.hcb: DEBUG
    org.springframework.security: INFO
    # Stops long "Filter@…" filter-chain dumps (startup and FilterChainProxy INFO noise)
    org.springframework.security.web: WARN
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: ${SERVER_PORT:8090}
  error:
    include-message: never             # Never expose internal errors to API consumers
    include-stacktrace: never
    include-binding-errors: never

---
################################################################################
# PROD PROFILE
################################################################################

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}               # Must be set via environment variable
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  h2:
    console:
      enabled: false                   # NEVER enable in production

  sql:
    init:
      mode: never                      # Schema managed via Flyway in production

hcb:
  jwt:
    secret: ${HCB_JWT_SECRET}          # Must be set in production environment
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 604800

  schema-mapper:
    enabled: ${HCB_SCHEMA_MAPPER_ENABLED:true}
    llm-enabled: ${SCHEMA_MAPPER_LLM_ENABLED:true}
    openai-model: ${OPENAI_SCHEMA_MODEL:gpt-4o-mini}

  security:
    cors-allowed-origins: ${HCB_CORS_ORIGINS}

logging:
  level:
    com.hcb: INFO
    org.springframework.security: WARN
