openapi: 3.1.0
info:
  title: Hybrid Credit Bureau Platform APIs
  version: 1.0.0
  description: |
    Canonical REST API for the HCB Admin Portal and integrations. **Production contract:** Spring Boot (`hcb-spring-api`)
    serves `/api/v1/**` (default local port 8090). Vite dev proxies `/api` to Spring.

    **Service map (logical):**
    - **Auth Service** — JWT login, MFA, refresh, session context.
    - **Institution Service** — member onboarding, billing, API access, consent, consortium/product links.
    - **Monitoring Service** — API request logs, enquiry logs, KPIs, charts.
    - **Data Governance Service** — data policies, drift alerts, schema mapper (when enabled).
    - **Reporting Service** — operational report requests.
    - **User Management Service** — users, invitations, roles (RBAC).
    - **Alert Engine Service** — alert rules, incidents, SLA breach history.
    - **Batch Processing Service** — batch job lifecycle, execution console detail.

    **Legacy reference:** Node Fastify on port 8091 mirrors many of the same paths with in-memory state — not the production contract owner.

    **Reserved (SecurityConfig, not implemented in current Spring controllers):** `/api/v1/submission/**`, `/api/v1/inquiry/**`, `/api/v1/governance/**` — authorized for future member traffic APIs (`API_USER` / `SUPER_ADMIN`). **Ops:** Spring Actuator `GET /actuator/health` is public (not under `/api/v1`).

    **Global auth:** SPA uses `Authorization: Bearer <JWT>`. CORS allows `X-API-Key` for partner patterns; member API keys are provisioned via `/api/v1/api-keys` (admin UI); inbound key validation for traffic APIs is reserved for those routes.

    **Errors:** `ApiError` JSON for most failures; validation may return a field→message map (400). DELETE under `/api/v1/**` requires `SUPER_ADMIN` per global `SecurityConfig` (stricter than some `@PreAuthorize` on controllers).
servers:
  - url: https://api.hcb.com
    description: Production
  - url: https://uat.api.hcb.com
    description: UAT
  - url: http://127.0.0.1:8090
    description: Local Spring Boot (canonical)
  - url: http://127.0.0.1:8091
    description: Legacy Fastify dev (in-memory)
tags:
  - name: Authentication
    description: Login, MFA, tokens — used by all personas before calling protected APIs.
  - name: Health
    description: Liveness for load balancers and CI.
  - name: Institutions
    description: Member institution lifecycle, registration wizard metadata, compliance docs, subscriptions — Bureau Admin workflows.
  - name: Consortiums
    description: Data-sharing consortiums and members — governance onboarding.
  - name: Products
    description: Data products / credit packages and packet catalogue — product owners.
  - name: Monitoring
    description: API traffic and enquiry analytics — Analyst / Admin.
  - name: Dashboard
    description: Executive KPIs, charts, command center — operational visibility.
  - name: Data Governance
    description: Masking policies, drift alerts, schema mapper — Analyst / Admin.
  - name: Schema Mapper
    description: Ingest, mappings, rules, approvals — data architecture workflows.
  - name: Reports
    description: Scheduled / on-demand operational reports.
  - name: Users
    description: Directory, invitations, lifecycle — Super Admin / Bureau Admin.
  - name: Roles
    description: RBAC catalogue — Super Admin.
  - name: API Keys
    description: Institution-scoped keys for future traffic APIs — Admin.
  - name: Approvals
    description: Unified approval queue (institutions, products, consortiums, schema mappings, alert rules).
  - name: Audit
    description: Immutable activity log — compliance; `API_USER` allowed per `SecurityConfig`.
  - name: Alerts
    description: Alert rules and incidents — operations.
  - name: SLA
    description: SLA configuration — Admin.
  - name: Batch Processing
    description: Data submission batch jobs and execution console.
  - name: External Integrations
    description: Headers, idempotency, and partner-facing conventions (future traffic APIs).

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from POST /api/v1/auth/login or /mfa/verify; refresh via /auth/refresh.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Reserved for member API traffic; keys issued per institution via Admin API.

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
      description: Zero-based page index.
    Size:
      name: size
      in: query
      schema: { type: integer, minimum: 1, maximum: 500, default: 20 }
      description: Page size (schema mapper caps size server-side at 500 for registry list).

  headers:
    XRequestId:
      description: Correlation id (client or gateway); echoed where applicable.
      schema: { type: string, example: "req-8f2a1c9e-4410-4b2d-9c11-0a7e4d88c001" }
    RateLimitRemaining:
      description: Reserved — rate limits may be enforced on auth and traffic APIs.
      schema: { type: string, example: "58" }
    IdempotencyKey:
      description: Reserved for unsafe retries on write APIs.
      schema: { type: string, example: "idem-20260402-88421" }

  schemas:
    ApiError:
      type: object
      required: [error, message, timestamp, path]
      properties:
        error:
          type: string
          description: Stable machine code (e.g. ERR_AUTH_FAILED, ERR_INTERNAL).
          example: ERR_VALIDATION
        message:
          type: string
          example: At least one of isDataSubmitter or isSubscriber must be true
        timestamp:
          type: string
          format: date-time
          example: "2026-04-02T14:22:01"
        path:
          type: string
          example: /api/v1/institutions
        retryAfterSeconds:
          type: integer
          description: Present for MFA resend cooldown (HTTP 429).
          example: 42
    ValidationFieldErrors:
      type: object
      additionalProperties: { type: string }
      example:
        email: Valid email required
        password: Password is required
    PageContainer:
      type: object
      properties:
        content: { type: array, items: {} }
        totalElements: { type: integer, example: 142 }
        totalPages: { type: integer, example: 8 }
        page: { type: integer, example: 0 }
        size: { type: integer, example: 20 }
    Institution:
      type: object
      description: Member institution — core bureau participant record.
      required: [id, name, institutionType, institutionLifecycleStatus, registrationNumber, jurisdiction, isDataSubmitter, isSubscriber, apisEnabledCount, isDeleted]
      properties:
        id: { type: integer, format: int64, example: 1001 }
        name: { type: string, example: "Metro Retail Finance Ltd" }
        tradingName: { type: string, nullable: true, example: "MRF Loans" }
        institutionType: { type: string, example: "NBFC" }
        institutionLifecycleStatus:
          type: string
          enum: [pending, active, suspended, draft]
          example: active
        registrationNumber: { type: string, example: "NBFC-MET-2026-1001" }
        jurisdiction: { type: string, example: "IN-MH" }
        licenseType: { type: string, nullable: true, example: "NBFC-D" }
        licenseNumber: { type: string, nullable: true, example: "NFC-2019-88421" }
        contactEmail: { type: string, format: email, example: "ops@mrfloans.in" }
        contactPhone: { type: string, example: "+91-22-4411-2200" }
        onboardedAt: { type: string, format: date-time, nullable: true }
        isDataSubmitter: { type: boolean, example: true }
        isSubscriber: { type: boolean, example: true }
        billingModel: { type: string, example: "postpaid" }
        creditBalance: { type: string, example: "125000.00" }
        dataQualityScore: { type: string, example: "97.40" }
        matchAccuracyScore: { type: string, example: "96.20" }
        slaHealthPercent: { type: string, example: "99.10" }
        apisEnabledCount: { type: integer, example: 2 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        isDeleted: { type: boolean, example: false }
    User:
      type: object
      description: Portal user row returned by GET /users and /users/{id}.
      properties:
        id: { type: integer, format: int64, example: 12 }
        email: { type: string, example: "analyst@hcb.com" }
        displayName: { type: string, example: "Priya Analyst" }
        givenName: { type: string, nullable: true }
        familyName: { type: string, nullable: true }
        userAccountStatus: { type: string, example: "active" }
        mfaEnabled: { type: boolean, example: true }
        institutionId: { type: integer, format: int64, nullable: true, example: 1001 }
        institutionName: { type: string, nullable: true, example: "Metro Retail Finance Ltd" }
        roles:
          type: array
          items: { type: string }
          example: ["ANALYST"]
        createdAt: { type: string, format: date-time }
        lastLoginAt: { type: string, format: date-time, nullable: true }
    APIRequestLog:
      type: object
      description: Row from GET /monitoring/api-requests content[].
      properties:
        requestId: { type: string, example: "REQ-8842101" }
        apiKey: { type: string, example: "hcb_1001_a3f2_" }
        endpoint: { type: string, example: "/submission/v1/accounts" }
        status: { type: string, example: success }
        responseTimeMs: { type: integer, example: 118 }
        records: { type: integer, example: 240 }
        errorCode: { type: string, nullable: true, example: null }
        timestamp: { type: string, example: "2026-04-02 13:55:22" }
    Enquiry:
      type: object
      description: Row from GET /monitoring/enquiries content[] (Spring projection).
      properties:
        enquiryId: { type: string, example: "5501" }
        institution: { type: string, example: "Metro Retail Finance Ltd" }
        status: { type: string, example: success }
        responseTimeMs: { type: integer, example: 86 }
        enquiryType: { type: string, example: "Comprehensive Credit Profile" }
        timestamp: { type: string, example: "2026-04-02 13:52:10" }
    Report:
      type: object
      properties:
        id: { type: integer, format: int64, example: 301 }
        type: { type: string, example: "Portfolio Performance Summary" }
        name: { type: string, example: "Portfolio Performance Summary" }
        status: { type: string, example: queued }
        dateFrom: { type: string, example: "2026-01-01" }
        dateTo: { type: string, example: "2026-03-31" }
        requestedBy: { type: string, example: "admin@hcb.com" }
        requestedAt: { type: string, example: "2026-04-02 09:15:00" }
        completedAt: { type: string, nullable: true }
    AlertRule:
      type: object
      properties:
        id: { type: string, example: "42" }
        name: { type: string, example: "Submission error rate spike" }
        domain: { type: string, example: "Submission API" }
        condition: { type: string, example: "error_rate_5m > 2%" }
        severity: { type: string, enum: [Critical, Warning, Info], example: Warning }
        status: { type: string, enum: [Enabled, Disabled, "Pending approval"], example: Enabled }
        lastTriggered: { type: string, nullable: true, example: "2026-04-01 22:10:00" }
    SchemaMapping:
      type: object
      description: Schema mapper mapping resource (JSON from service; shape varies by workflow).
      additionalProperties: true
      example:
        id: "map-88421"
        status: "needs_review"
        schemaVersionId: "sv-1022"
        fieldMappings: []
    ValidationRule:
      type: object
      description: Per-mapping validation rule (JSON body to POST/PATCH rules).
      additionalProperties: true
      example:
        id: "rule-12"
        fieldPath: "borrower.pan"
        ruleType: "regex"
        expression: "^[A-Z]{5}[0-9]{4}[A-Z]$"
    Agent:
      type: object
      description: Synthetic pipeline agent tile from GET /dashboard/command-center.
      properties:
        id: { type: string, example: "pipeline-schema-mapper" }
        name: { type: string, example: "Schema Mapper" }
        type: { type: string, example: schema }
        task: { type: string, example: "AI-assisted mapping to canonical bureau schema" }
        status: { type: string, enum: [active, idle, warning], example: active }
        latencyMs: { type: integer, example: 11 }
        accuracyPct: { type: number, example: 97.4 }
    BatchJob:
      type: object
      properties:
        batchId: { type: string, example: "999901" }
        institutionId: { type: string, example: "1001" }
        fileName: { type: string, example: "march_submissions.csv" }
        status: { type: string, example: Processing }
        totalRecords: { type: integer, example: 50000 }
        successRecords: { type: integer, example: 48220 }
        failedRecords: { type: integer, example: 1780 }
        successRate: { type: number, example: 96.44 }
        durationSeconds: { type: integer, example: 942 }
        uploadedAt: { type: string, example: "2026-04-02 08:01:33" }
        uploadedBy: { type: string, example: "batch.ops@hcb.com" }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: "admin@hcb.com" }
        password: { type: string, format: password, example: "Admin@1234" }
        captchaToken: { type: string, description: Required when Turnstile enabled on API., example: "0.AbCdEf_turnstile_token" }
    AuthLoginResponse:
      type: object
      description: Step-1 login — either MFA challenge or tokens.
      properties:
        mfaRequired: { type: boolean }
        mfaChallengeId: { type: string, example: "mfa-ch-88421a" }
        emailMasked: { type: string, example: "a***@hcb.com" }
        resendAvailableInSeconds: { type: integer, example: 45 }
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, example: 900 }
        user:
          $ref: "#/components/schemas/UserSummary"
    UserSummary:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        email: { type: string, example: "admin@hcb.com" }
        displayName: { type: string, example: "HCB Administrator" }
        roles:
          type: array
          items: { type: string }
          example: ["BUREAU_ADMIN"]
        institutionId: { type: integer, nullable: true }
        institutionName: { type: string, nullable: true }
    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, example: 900 }
        user:
          $ref: "#/components/schemas/UserSummary"
    MfaVerifyRequest:
      type: object
      required: [mfaChallengeId, code]
      properties:
        mfaChallengeId: { type: string, example: "mfa-ch-88421a" }
        code: { type: string, example: "123456" }
    MfaResendRequest:
      type: object
      required: [mfaChallengeId]
      properties:
        mfaChallengeId: { type: string, example: "mfa-ch-88421a" }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." }
    LogoutRequest:
      type: object
      properties:
        refresh_token: { type: string }

  responses:
    BadRequest:
      description: Validation or business rule failure.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/ApiError"
              - $ref: "#/components/schemas/ValidationFieldErrors"
          examples:
            apiError:
              value:
                error: ERR_VALIDATION
                message: consortiumId is required
                timestamp: "2026-04-02T14:22:01"
                path: /api/v1/institutions/1001/consortium-memberships
            fieldErrors:
              value:
                email: Valid email required
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: ERR_AUTH_REQUIRED }
              message: { type: string, example: Authentication required }
    Forbidden:
      description: Authenticated but insufficient role (e.g. VIEWER on write, ANALYST blocked from approvals).
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: ERR_ACCESS_DENIED }
              message: { type: string, example: Insufficient permissions }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    Conflict:
      description: Conflict (e.g. duplicate email on invite).
    NoContent:
      description: Success with no body (204).
    InternalError:
      description: Unexpected server error — generic message only.
      content:
        application/json:
          schema:
            type: object
            example:
              error: ERR_INTERNAL
              message: An internal error occurred
              timestamp: "2026-04-02T14:22:01"
              path: /api/v1/reports

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Liveness probe
      description: Public endpoint for load balancers; returns service id.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: hcb-spring-api }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Password login (step 1)
      description: May return MFA challenge for users with mfa_enabled; otherwise JWT pair.
      operationId: postAuthLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: MFA challenge or authenticated session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthLoginResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/auth/mfa/verify:
    post:
      tags: [Authentication]
      summary: Complete MFA challenge
      operationId: postAuthMfaVerify
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MfaVerifyRequest" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/auth/mfa/resend:
    post:
      tags: [Authentication]
      summary: Resend MFA OTP
      operationId: postAuthMfaResend
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MfaResendRequest" }
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429":
          description: Resend cooldown
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      operationId: postAuthRefresh
      security: []
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { description: Missing refresh_token }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Invalidate refresh session
      operationId: postAuthLogout
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/auth/me:
    get:
      tags: [Authentication]
      summary: Current user summary from JWT
      operationId: getAuthMe
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/institutions/form-metadata:
    get:
      tags: [Institutions]
      summary: Registration wizard field layout
      description: Driven by geography; aligns SPA Step 1 with backend JSON config.
      operationId: getInstitutionFormMetadata
      parameters:
        - name: geography
          in: query
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/institutions:
    get:
      tags: [Institutions]
      summary: Page member institutions
      operationId: listInstitutions
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/Size" }
        - name: status
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: jurisdiction
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Spring Data Page of Institution
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { $ref: "#/components/schemas/Institution" }
                  totalElements: { type: integer }
                  totalPages: { type: integer }
                  size: { type: integer }
                  number: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Institutions]
      summary: Register institution (queues approval)
      operationId: createInstitution
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Institution" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/institutions/{id}:
    get:
      tags: [Institutions]
      summary: Get institution by id
      operationId: getInstitution
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    put:
      tags: [Institutions]
      summary: Full update (subset of fields)
      operationId: putInstitution
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Institution" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    patch:
      tags: [Institutions]
      summary: Partial update
      operationId: patchInstitution
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
