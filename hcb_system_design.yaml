    rules:
      - append_only: true
      - no_overwrite: true
      - referential_integrity_enforced: true
    daily_inserts:
      - api_requests: ~28000 new rows
      - enquiries: ~3800 new rows
      - batch_jobs: ~5 new rows
      - alert_incidents: computed from alert_rules evaluation
      - sla_breaches: computed from threshold checks

  future_data:
    window_days: 30
    start_date: "2026-03-29"
    end_date: "2026-04-28"
    entities:
      - api_requests: pre-seeded with realistic volume distribution
      - enquiries: pre-seeded with daily enquiry patterns
      - batch_jobs: pre-seeded with 5/day completion patterns
      - sla_breaches: 1-2 breach events per week pre-seeded

################################################################################
# SECTION 10 — RBAC
################################################################################

rbac:

  enforcement_point: API Gateway / Spring Security filter chain
  principle: deny_by_default

  roles:
    - name: Super Admin
      scope: platform
      note: Full access to all modules and system management
    - name: Bureau Admin
      scope: platform
      note: Institution and governance management, monitoring, no user management
    - name: Analyst
      scope: institution_scoped
      note: Read analytics, reports, monitoring; no mutations to institutions or users
    - name: Viewer
      scope: platform
      note: Dashboard read-only; no sensitive data
    - name: API User
      scope: programmatic
      note: Machine access for submission/inquiry APIs only

  permissions:
    - key: MANAGE_INSTITUTIONS
      granted_to: [Super Admin, Bureau Admin]
    - key: VIEW_DASHBOARD
      granted_to: [Super Admin, Bureau Admin, Analyst, Viewer]
    - key: MANAGE_DATA_GOVERNANCE
      granted_to: [Super Admin, Bureau Admin]
    - key: VIEW_MONITORING
      granted_to: [Super Admin, Bureau Admin, Analyst]
    - key: GENERATE_REPORTS
      granted_to: [Super Admin, Bureau Admin, Analyst]
    - key: MANAGE_USERS
      granted_to: [Super Admin]
    - key: ACCESS_API
      granted_to: [Super Admin, API User]
    - key: VIEW_AUDIT_LOGS
      granted_to: [Super Admin, Bureau Admin, Analyst, API User]

  hard_rules:
    - permissions_not_stored_in_users_table: true
    - role_check_only_via_user_role_assignments_join: true
    - jwt_claims_include_role_list: true
    - api_gateway_enforces_before_service_layer: true

################################################################################
# SECTION 11 — DERIVED METRICS
################################################################################

derived_metrics:

  rule: Computed at query time only. Never stored in DB.
  examples:
    - metric: success_rate_percent
      computation: "COUNT(status='success') * 100.0 / COUNT(*) FROM api_requests WHERE ..."
    - metric: avg_p95_latency
      computation: "percentile_cont(0.95) OVER (...) FROM api_requests"
    - metric: batch_success_rate
      computation: "success_count * 100.0 / total_records FROM batch_jobs"
    - metric: data_quality_score
      computation: "(1 - validation_failure_rate) * 100 aggregated per institution"
    - metric: credit_score
      computation: "computed by batch credit_profile recalculation job, stored in credit_profiles"

################################################################################
# SECTION 12 — SECURITY
################################################################################

security:

  transport:
    protocol: TLS_1.3_minimum
    hsts: true
    certificate_pinning: recommended_for_mobile

  data_at_rest:
    consumer_pii_fields:
      - full_name_encrypted: AES-256-GCM via application-layer encryption
      - date_of_birth_encrypted: AES-256-GCM
      - national_id: SHA-256 hash stored (one-way for matching)
      - phone_hash: HMAC-SHA256 with pepper
      - email_hash: HMAC-SHA256 with pepper
    api_key_raw: "write-once, SHA-256 hash stored, raw value never retrievable post-creation"
    ip_addresses: "SHA-256 hashed before log storage"
    passwords: "bcrypt cost factor 12 minimum"

  secrets_management:
    rule: No plaintext secrets in code, config files, or version control
    strategy:
      - Use environment variables for JWT secret, DB path, encryption keys
      - Key rotation policy documented in configuration guide
      - H2 console credentials managed via environment variables (not hardcoded)

  api_security:
    authentication: JWT Bearer token (access token, 15-minute expiry)
    authorization: Role-based, deny-by-default
    rate_limiting:
      - global: 5000 req/min per API key
      - auth_endpoints: 5 req/min per IP
    input_validation:
      - strict schema validation on all POST/PUT bodies
      - SQL injection protection via parameterized queries only
      - XSS protection via output encoding
    error_responses:
      - never expose stack traces, DB errors, or internal paths in API responses
      - use generic error codes (e.g. ERR_AUTH_FAILED, ERR_VALIDATION) only
    cors:
      - allow_origins configured per environment (not wildcard in production)

  least_privilege:
    db_service_account: read/write to application tables only (no DDL, no DROP)
    h2_console: development environment only (disabled in production profile)
    backup_access: restricted to ops role, encrypted at rest

  audit_compliance:
    audit_logs_append_only: true
    audit_log_retention_days: 2555
    pii_not_in_logs: true
    sensitive_request_fields_masked: [password, api_key, token, refresh_token]

################################################################################
# SECTION 13 — BATCH PROCESSING
################################################################################

batch_processing:

  rules:
    - validate_each_record_against_validation_rules
    - map_to_correct_owner_tables_only
    - avoid_duplicate_entity_creation_via_hash_dedup
    - wrap_each_batch_in_db_transaction
    - rollback_on_critical_failure
    - append_only_no_overwrite

  error_handling:
    partial_success: allowed (record-level success/failure tracked in batch_records)
    max_failure_threshold_percent: 10
    on_threshold_exceeded: abort batch, mark as failed, alert triggered

  audit:
    every_batch_creates: batch_jobs row
    every_record_outcome: batch_records row
    every_batch_run_logged: audit_logs (action_type=BATCH_JOB_CREATED)
