################################################################################
# SECTION 7 — DATA FLOWS
################################################################################

data_flows:

  submission_flow:
    description: API or batch-based tradeline data ingestion
    steps:
      - step: 1_authenticate
        action: Validate X-API-Key against api_keys.key_hash
        tables: [api_keys]
      - step: 2_validate_schema
        action: Apply validation_rules to incoming fields
        tables: [validation_rules, canonical_fields]
      - step: 3_resolve_consumer
        action: Hash national_id, lookup or create consumer
        tables: [consumers]
      - step: 4_insert_tradeline
        action: INSERT into tradelines with FK to consumer + institution
        tables: [tradelines]
      - step: 5_log_api_request
        action: INSERT api_requests (append-only, mandatory)
        tables: [api_requests]
      - step: 6_log_audit
        action: INSERT audit_logs (action_type=TRADELINE_SUBMITTED)
        tables: [audit_logs]
    transaction_boundary: steps 3-5 wrapped in single DB transaction
    rollback_on: any insert failure in steps 3-5

  inquiry_flow:
    description: Credit bureau inquiry — join-assembled response
    steps:
      - step: 1_authenticate
        action: Validate API key and product subscription
        tables: [api_keys, product_subscriptions]
      - step: 2_verify_consent
        action: Check enquiries consent reference
        tables: [consumers, enquiries]
      - step: 3_fetch_profile
        action: JOIN consumers + credit_profiles
        tables: [consumers, credit_profiles]
      - step: 4_fetch_tradelines
        action: JOIN tradelines filtered by product data scope
        tables: [tradelines, products]
      - step: 5_record_enquiry
        action: INSERT enquiries (hard/soft pull)
        tables: [enquiries]
      - step: 6_log
        action: INSERT api_requests + audit_logs
        tables: [api_requests, audit_logs]

  approval_flow:
    description: Review workflow for institutions, products, consortiums, mappings
    steps:
      - step: 1_submit
        action: Entity created with draft status; INSERT approval_queue
      - step: 2_review
        action: Reviewer loads approval_queue; joins entity data for context
      - step: 3_decision
        action: APPROVE → entity status='active'; REJECT → rejection_reason recorded
        transaction: true
      - step: 4_audit
        action: INSERT audit_logs with decision action_type

  daily_refresh_flow:
    description: Append-only daily operational data simulation/refresh
    rules:
      - append_only: true
      - no_overwrite: all time-series data is immutable after insertion
      - referential_integrity_check: validate all FKs before INSERT
    entities_refreshed:
      - api_requests (new daily log entries)
      - enquiries (simulated daily enquiry volume)
      - batch_jobs (new batch run records)
      - sla_breaches (computed from fresh metrics)
      - alert_incidents (fired from alert_rules evaluation)

################################################################################
# SECTION 8 — LOGGING
################################################################################

logging:

  api_requests:
    rule: Every API call (authenticated or not) must create one row in api_requests
    enforcement: server-side interceptor / Spring filter chain
    fields_captured:
      - api_key_id (FK, not raw key)
      - institution_id (FK)
      - endpoint
      - http_method
      - api_request_status
      - response_time_ms
      - records_processed
      - error_code
      - client_ip_hash (SHA-256 of IP — never plain IP)
      - request_id (UUID, idempotency)
      - occurred_at
    security:
      - raw API key values are never written to this table
      - IP addresses are hashed before storage

  audit_logs:
    rule: Every business action must create one immutable row in audit_logs
    enforcement: service-layer mandatory call after every write operation
    action_types:
      - AUTH_LOGIN / AUTH_LOGOUT / AUTH_TOKEN_REFRESH
      - INSTITUTION_CREATED / INSTITUTION_UPDATED / INSTITUTION_SUSPENDED / INSTITUTION_DELETED
      - USER_CREATED / USER_UPDATED / USER_SUSPENDED / USER_ACTIVATED / USER_DELETED
      - USER_ROLE_ASSIGNED
      - API_KEY_REGENERATED / API_KEY_REVOKED
      - APPROVAL_APPROVED / APPROVAL_REJECTED / APPROVAL_CHANGES_REQUESTED
      - TRADELINE_SUBMITTED
      - BATCH_JOB_CREATED / BATCH_JOB_RETRIED / BATCH_JOB_CANCELLED
      - REPORT_CREATED / REPORT_CANCELLED / REPORT_RETRIED
      - ALERT_RULE_ACTIVATED / ALERT_RULE_DEACTIVATED
      - ALERT_ACKNOWLEDGED / ALERT_RESOLVED
      - SLA_CONFIG_UPDATED
      - MAPPING_APPROVED / MAPPING_REJECTED
    fields_captured:
      - user_id (FK)
      - action_type
      - entity_type
      - entity_id
      - description
      - ip_address_hash
      - audit_outcome
      - occurred_at
    security:
      - audit_logs table is append-only (no UPDATE, no DELETE)
      - ip_address_hash never stores raw IP

